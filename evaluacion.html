<script>

const db = window.supabase.createClient(
"https://ewlqelsmrnmuvylxlpur.supabase.co",
"sb_publishable_y6G6nvMYnWpSIpcbrhah_Q_LkvOGktb"
)

let preguntas = []
let respuestas = []
let preguntaActual = 0

async function startExam(){

const token=document.getElementById("token").value
const cedula=document.getElementById("cedula").value

if(!token || !cedula){
alert("Debes ingresar token y cédula")
return
}

const {data:tok,error:errTok}=await db
.from("evaluation_tokens")
.select("*")
.eq("token",token)
.eq("activo",true)
.single()

if(errTok){
alert("Token inválido")
return
}

const {data:qs}=await db
.from("evaluation_questions")
.select("*")
.eq("evaluation_id",tok.evaluation_id)

preguntas=qs
respuestas = new Array(qs.length)

mostrarPregunta()

}

function mostrarPregunta(){

const cont=document.getElementById("exam")
const q = preguntas[preguntaActual]

cont.innerHTML = `
<div class="question">

<h3>${preguntaActual+1}. ${q.pregunta}</h3>

<label><input type="radio" name="resp" value="A"> ${q.opcion_a}</label><br>
<label><input type="radio" name="resp" value="B"> ${q.opcion_b}</label><br>
<label><input type="radio" name="resp" value="C"> ${q.opcion_c}</label><br>
<label><input type="radio" name="resp" value="D"> ${q.opcion_d}</label><br><br>

<button onclick="siguiente()">Siguiente</button>

</div>
`

}

function siguiente(){

const r=document.querySelector(`input[name="resp"]:checked`)

if(!r){
alert("Debes seleccionar una respuesta")
return
}

respuestas[preguntaActual] = r.value

preguntaActual++

if(preguntaActual >= preguntas.length){
finalizar()
}else{
mostrarPregunta()
}

}

async function finalizar(){

let correctas=0

preguntas.forEach((q,i)=>{
if(respuestas[i]==q.respuesta_correcta){
correctas++
}
})

const score=Math.round((correctas/preguntas.length)*100)

alert("Resultado: "+score+"%")

const aprobado = score >= 90

const token=document.getElementById("token").value
const cedula=document.getElementById("cedula").value

const {data:tok}=await db
.from("evaluation_tokens")
.select("*")
.eq("token",token)
.single()

await db
.from("evaluation_attempts")
.insert({
evaluation_id:tok.evaluation_id,
cedula:cedula,
score:score,
aprobado:aprobado
})

document.getElementById("exam").innerHTML = `
<h2>Evaluación finalizada</h2>
<p>Resultado: ${score}%</p>
`

}

</script>
