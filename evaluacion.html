<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Evaluación técnica</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#050617;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:500px;
background:#111827;
padding:30px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
background:#0b1024;
border:1px solid #2a2f45;
color:white;
}

button{
padding:10px 20px;
background:#7c3aed;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.question{
margin-top:20px;
background:#0b1024;
padding:15px;
border-radius:6px;
}
.option{
display:flex;
align-items:center;
gap:10px;
padding:12px;
margin-top:10px;
border-radius:8px;
background:#0b1024;
border:1px solid #2a2f45;
cursor:pointer;
}

.option input{
margin:0;
accent-color:#7c3aed;
transform:scale(1.2);
}

.option span{
flex:1;
}

@media (max-width:600px){

.container{
width:100%;
padding:20px;
}

button{
width:100%;
}

}
.option{
display:flex;
align-items:center;
gap:12px;
padding:14px;
margin-top:12px;
border-radius:10px;
background:#0b1024;
border:1px solid #2a2f45;
cursor:pointer;
justify-content:flex-start;
}

.option input{
margin:0;
accent-color:#7c3aed;
transform:scale(1.2);
flex-shrink:0;
}

.option span{
flex:1;
line-height:1.4;
}

input[type="radio"]{
accent-color:#7c3aed;
transform:scale(1.1);
}

#nombreEmpleado{
margin-bottom:20px;
font-weight:bold;
color:#a78bfa;
}

</style>

</head>

<body>

<div class="container">

<h2>Evaluación técnica</h2>

<div id="login">

<label>TOKEN</label>
<input id="token">

<label>CÉDULA</label>
<input id="cedula" type="tel" inputmode="numeric" autocomplete="off">

<button id="btnStart">Iniciar evaluación</button>

</div>

<div id="examArea" style="display:none">

<div id="nombreEmpleado"></div>

<div id="exam"></div>

</div>

</div>

<script>

const db = window.supabase.createClient(
"https://ewlqelsmrnmuvylxlpur.supabase.co",
"sb_publishable_y6G6nvMYnWpSIpcbrhah_Q_LkvOGktb"
)

let preguntas=[]
let respuestas=[]
let index=0
let empleadoNombre=""
let evaluation_id=null

document.getElementById("btnStart").addEventListener("click",startExam)

async function startExam(){

const token=document.getElementById("token").value.trim()
const cedula=document.getElementById("cedula").value.replace(/\D/g,'')

if(!token || !cedula){
alert("Debes ingresar token y cédula")
return
}

const {data:tok,error:errTok}=await db
.from("evaluation_tokens")
.select("*")
.eq("token",token)
.eq("activo",true)
.single()

if(errTok){
alert("Token inválido")
return
}

evaluation_id = tok.evaluation_id

// VALIDAR CÉDULA
const {data:emp,error:errEmp}=await db
.from("employees")
.select("nombre")
.eq("documento", String(cedula))
.single()

if(errEmp){
alert("Cédula no encontrada")
return
}

empleadoNombre = emp.nombre

document.getElementById("login").style.display="none"
document.getElementById("examArea").style.display="block"

document.getElementById("nombreEmpleado").innerText =
"Evaluación de: " + empleadoNombre

// CARGAR PREGUNTAS
const {data:qs}=await db
.from("evaluation_questions")
.select("*")
.eq("evaluation_id",evaluation_id)

preguntas=qs
respuestas=new Array(qs.length)

mostrarPregunta()

}

function mostrarPregunta(){

const q=preguntas[index]

const cont=document.getElementById("exam")

cont.innerHTML=`
<div class="question">

<h3>${index+1}. ${q.pregunta}</h3>

<label class="option">
<input type="radio" name="resp" value="A">
<span>${q.opcion_a}</span>
</label>

<label class="option">
<input type="radio" name="resp" value="B">
<span>${q.opcion_b}</span>
</label>

<label class="option">
<input type="radio" name="resp" value="C">
<span>${q.opcion_c}</span>
</label>

<label class="option">
<input type="radio" name="resp" value="D">
<span>${q.opcion_d}</span>
</label>

<br><br>

<button onclick="next()">Siguiente</button>

</div>
`

}

function next(){

const r=document.querySelector('input[name="resp"]:checked')

if(!r){
alert("Debes seleccionar una respuesta")
return
}

respuestas[index]=r.value

index++

if(index>=preguntas.length){
finalizar()
}else{
mostrarPregunta()
}

}

async function finalizar(){

let correctas=0

preguntas.forEach((q,i)=>{
if(respuestas[i]==q.respuesta_correcta){
correctas++
}
})

const score=Math.round((correctas/preguntas.length)*100)

document.getElementById("exam").innerHTML=`
<h2>Evaluación finalizada</h2>
<p>Empleado: ${empleadoNombre}</p>
<p>Resultado: ${score}%</p>
`

}

</script>

</body>
</html>
