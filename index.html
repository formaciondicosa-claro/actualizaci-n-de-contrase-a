/* =========================================================
   HELPERS
========================================================= */
const $ = (id) => document.getElementById(id);
const $status = $("status");
const $log = $("log");

function setStatus(html){ $status.innerHTML = html; }
function setLog(obj){ $log.textContent = (typeof obj === "string") ? obj : JSON.stringify(obj, null, 2); }
function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function val(x){ return String(x ?? "").trim(); }
function normDoc(x){ return String(x ?? "").trim().replace(/[^\d]/g, ""); }
function normEmail(x){
  const s = String(x ?? "").trim().toLowerCase();
  return s || null;
}
function addDaysISO(isoDate, days){
  const d = new Date(isoDate + "T00:00:00");
  d.setDate(d.getDate() + days);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${yyyy}-${mm}-${dd}`;
}
function parseDateToISO(v){
  if(v === null || v === undefined) return null;
  const s0 = String(v).trim();
  if(!s0) return null;

  if(/^\d{4}-\d{2}-\d{2}$/.test(s0)) return s0;

  const m = s0.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m){
    const dd = String(m[1]).padStart(2,"0");
    const mm = String(m[2]).padStart(2,"0");
    const yyyy = m[3];
    return `${yyyy}-${mm}-${dd}`;
  }

  if(/^\d+(\.\d+)?$/.test(s0)){
    const n = Number(s0);
    if(isFinite(n) && n > 0){
      const excelEpoch = new Date(Date.UTC(1899, 11, 30));
      excelEpoch.setUTCDate(excelEpoch.getUTCDate() + Math.floor(n));
      const yyyy = excelEpoch.getUTCFullYear();
      const mm = String(excelEpoch.getUTCMonth()+1).padStart(2,"0");
      const dd = String(excelEpoch.getUTCDate()).padStart(2,"0");
      return `${yyyy}-${mm}-${dd}`;
    }
  }

  const d = new Date(s0);
  if(!isNaN(d.getTime())){
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const dd = String(d.getDate()).padStart(2,"0");
    return `${yyyy}-${mm}-${dd}`;
  }
  return null;
}
function downloadTextFile(content, filename, mime){
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 600);
}

/* =========================================================
   CSV / XLSX
========================================================= */
function parseDelimited(text){
  text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  const firstLine = (text.split("\n").find(l => l.trim().length) || "");
  const commas = (firstLine.match(/,/g)||[]).length;
  const semis  = (firstLine.match(/;/g)||[]).length;
  const delim = semis > commas ? ";" : ",";

  const rows = [];
  let row = [];
  let cur = "";
  let inQuotes = false;

  for(let i=0;i<text.length;i++){
    const c = text[i];
    const n = text[i+1];
    if(c === '"'){
      if(inQuotes && n === '"'){ cur += '"'; i++; }
      else inQuotes = !inQuotes;
      continue;
    }
    if(c === delim && !inQuotes){ row.push(cur); cur=""; continue; }
    if(c === "\n" && !inQuotes){ row.push(cur); rows.push(row); row=[]; cur=""; continue; }
    cur += c;
  }
  if(cur.length || row.length){ row.push(cur); rows.push(row); }

  return rows
    .map(r => r.map(c => (c ?? "").toString()))
    .filter(r => r.some(c => c.trim() !== ""));
}
function parseXLSX(arrayBuffer){
  if(!window.XLSX) throw new Error("La librería XLSX no cargó. Usa CSV.");
  const wb = XLSX.read(arrayBuffer, { type: "array" });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
  return json
    .map(r => r.map(c => (c ?? "").toString()))
    .filter(r => r.some(c => String(c).trim() !== ""));
}

/* =========================================================
   SUPABASE
========================================================= */
function getSB(){
  if(!window.supabase || !window.supabase.createClient){
    throw new Error("No se cargó Supabase JS.");
  }
  window.__sb = window.__sb || window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_PUBLISHABLE_KEY,
    {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    }
  );
  return window.__sb;
}

   RESET

function isRecoveryFlow(){
  const h = (window.location.hash || "").toLowerCase();
  return h.includes("type=recovery") || h.includes("#reset") || h.includes("access_token=");
}
function showOnly(view){
  $("login").classList.toggle("hidden", view !== "login");
  $("resetBox").classList.toggle("hidden", view !== "reset");
  $("app").classList.toggle("hidden", view !== "app");
}
function goToLogin(){
  window.location.hash = "";
  showOnly("login");
  $("loginMsg").innerHTML = `<span class="small">Listo para iniciar sesión.</span>`;

/* =========================================================
   AUTH
========================================================= */
async function doLogin(){
  const sb = getSB();
  const email = val($("email").value);
  const password = val($("password").value);
  const btn = $("btnLogin");
  const msg = $("loginMsg");

  msg.innerHTML = "";
  if(!email || !password){
    msg.innerHTML = `<span class="err">Debes ingresar correo y contraseña.</span>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = "Ingresando...";
  msg.innerHTML = `<span class="small">Validando...</span>`;

  try{
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    setLog({ login_data: data, login_error: error });

    if(error){
      msg.innerHTML = `<span class="err">${esc(error.message)}</span>`;
      return;
    }
    if(!data?.session){
      msg.innerHTML = `<span class="err">No se obtuvo sesión.</span>`;
      return;
    }
    await bootApp();
  }catch(e){
    msg.innerHTML = `<span class="err">${esc(e.message || e)}</span>`;
  }finally{
    btn.disabled = false;
    btn.textContent = "Ingresar";
  }
}
async function doForgot(){
  const sb = getSB();
  const email = val($("email").value);
  const msg = $("loginMsg");
  msg.innerHTML = "";

  if(!email){
    msg.innerHTML = `<span class="err">Escribe el correo en el campo Correo.</span>`;
    return;
  }

  try{
    const redirectTo = `${window.location.origin}${window.location.pathname}#reset`;
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
    if(error){
      msg.innerHTML = `<span class="err">${esc(error.message)}</span>`;
      return;
    }
    msg.innerHTML = `<span class="ok">Listo.</span> Revisa tu correo para crear la contraseña.`;
  }catch(e){
    msg.innerHTML = `<span class="err">${esc(e.message || e)}</span>`;
  }
}
async function doLogout(){
  const sb = getSB();
  await sb.auth.signOut();
  location.reload();
}
async function doRevokeOtherSessions(){
  const sb = getSB();
  const ok = confirm("Esto cerrará sesiones activas en otros dispositivos.\n\n¿Continuar?");
  if(!ok) return;

  try{
    setStatus("Cerrando otras sesiones...");
    const { error } = await sb.auth.signOut({ scope: "others" });
    if(error) throw error;
    setStatus(`<span class="ok">Listo.</span> Otras sesiones cerradas.`);
  }catch(e){
    setStatus(`<span class="err">Error:</span> ${esc(e.message || e)}`);
    setLog(e);
  }
}
async function doResetPassword(){
  const sb = getSB();
  const msg = $("resetMsg");
  const btn = $("btnReset");

  const p1 = val($("newPassword").value);
  const p2 = val($("newPassword2").value);
  msg.innerHTML = "";

  if(!p1 || p1.length < 6){
    msg.innerHTML = `<span class="err">Mínimo 6 caracteres.</span>`;
    return;
  }
  if(p1 !== p2){
    msg.innerHTML = `<span class="err">Las contraseñas no coinciden.</span>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = "Guardando...";

  try{
    const { data: sess } = await sb.auth.getSession();
    if(!sess?.session){
      msg.innerHTML = `<span class="err">El enlace expiró o es inválido.</span>`;
      return;
    }

    const { error } = await sb.auth.updateUser({ password: p1 });
    if(error){
      msg.innerHTML = `<span class="err">${esc(error.message)}</span>`;
      return;
    }

    msg.innerHTML = `<span class="ok">Contraseña actualizada.</span>`;
    setTimeout(() => { goToLogin(); }, 1200);
  }catch(e){
    msg.innerHTML = `<span class="err">${esc(e.message || e)}</span>`;
    setLog(e);
  }finally{
    btn.disabled = false;
    btn.textContent = "Guardar contraseña";
  }
}

/* =========================================================
   PROFILE
========================================================= */
async function getProfile(user){
  const sb = getSB();
  const { data, error } = await sb
    .from("profiles")
    .select("user_id,nombre,rol,activo")
    .eq("user_id", user.id)
    .maybeSingle();

  if(error) throw error;

  if(!data){
    return {
      user_id: user.id,
      nombre: (user.email || "usuario").split("@")[0],
      rol: "capacitador",
      activo: true,
      __missing: true
    };
  }
  return data;
}

let STATE = { user:null, profile:null };

async function bootApp(){
  const sb = getSB();
  const { data: { session } } = await sb.auth.getSession();

  if(!session){
    showOnly("login");
    $("loginMsg").innerHTML = `<span class="small">Listo para iniciar sesión.</span>`;
    return;
  }

  const user = session.user;
  const profile = await getProfile(user);

  STATE.user = user;
  STATE.profile = profile;

  showOnly("app");

  $("whoami").textContent = `${user.email} · ${profile.nombre || ""} · uid: ${user.id}`;
  $("roleBadge").textContent = profile.rol || "capacitador";
  $("panelTitle").textContent = profile.rol === "administrador" ? "Panel Administrador" : "Panel Capacitador";

  $("btnLogout").onclick = doLogout;

  if(profile.rol === "administrador"){
    $("btnRevokeOthers").classList.remove("hidden");
    $("btnRevokeOthers").onclick = doRevokeOtherSessions;
  }else{
    $("btnRevokeOthers").classList.add("hidden");
  }

  setPanels(profile.rol);

  if(profile.__missing){
    setStatus(`<span class="warn">Aviso:</span> No existe tu fila en <code>profiles</code>.`);
  }else{
    setStatus(`<span class="ok">Sesión activa.</span>`);
  }

  setLog({ session_user: user, profile });

  if(profile.rol === "administrador"){
    await adminInit();
    await trainerInit();
  }else{
    await trainerInit();
  }
}

async function adminLoadSessions(){

      .from("sessions")

      return;
    }

    const abiertas = data.filter(s => String(s.estado || "").toLowerCase() !== "cerrada");

    const renderSessionItem = (s) => {
      const trName = s.trainings?.nombre || "Entrenamiento";

      return `
        <div class="item">
          <div class="row" style="justify-content:space-between;">

            <div>capacitador_user_id</div><div><code>${esc(s.formador_user_id || "")}</code></div>

              ? `<button class="btnMini btnGhost" type="button" onclick="adminSetSessionStatus('${s.id}','programada')">Reabrir</button>`
              : `<button class="btnMini btnGhost" type="button" onclick="adminSetSessionStatus('${s.id}','cerrada')">Cerrar sesión</button>`

async function adminCreateTraining(){
  const sb = getSB();
  const nombre = val($("trNombre").value);
  const vigencia = Number($("trDuracion").value || 1);
  const certifica = $("trCertifica").value === "true";
  const msg = $("trMsg");
  msg.innerHTML = "";

  if(!nombre){
    msg.innerHTML = `<span class="err">Debes ingresar el nombre.</span>`;
    return;
  }

  const vigencia_dias = Math.max(1, isFinite(vigencia) ? vigencia : 1);

  $("btnCreateTraining").disabled = true;
  $("btnCreateTraining").textContent = "Guardando...";

  try{
    const { data, error } = await sb
      .from("trainings")
      .insert({ nombre, vigencia_dias, certifica })
      .select("id,nombre,vigencia_dias,certifica")
      .single();

    if(error) throw error;

    msg.innerHTML = `<span class="ok">Entrenamiento creado.</span> training_id: <code>${esc(data.id)}</code>`;

    setLog(e);
  }finally{
    $("btnCreateTraining").disabled = false;
    $("btnCreateTraining").textContent = "Guardar entrenamiento";
  }

async function adminPrepareSessionDatesUI(session_id, training_id, startDate){
  const sb = getSB();
  $("datesBox").classList.remove("hidden");
  $("datesBox").dataset.sessionId = session_id;

  let dur = 1;
  try{
    const { data: tr, error } = await sb
      .from("trainings")
      .select("vigencia_dias")
      .eq("id", training_id)
      .maybeSingle();

    if(error) throw error;
    dur = Math.max(1, Number(tr?.vigencia_dias || 1));
  }catch(e){
    dur = 1;
  }

  const list = $("datesList");
  list.innerHTML = "";

  for(let i=0;i<dur;i++){
    const iso = addDaysISO(startDate, i);
    list.insertAdjacentHTML("beforeend", `
      <div class="item">
        <div class="row" style="justify-content:space-between;align-items:center;">
          <div class="small"><b>Día ${i+1}</b></div>
          <div class="small"><code>${esc(session_id)}</code></div>
        </div>
        <label>Fecha</label>
        <input type="date" class="dateInput" data-idx="${i}" value="${iso}" />
      </div>
    `);
  }

  $("datesMsg").innerHTML = `<span class="small">Sesión: <code>${esc(session_id)}</code>. Revisa/ajusta las fechas y guarda.</span>`;
}

async function adminSaveSessionDates(){
  const sb = getSB();
  const box = $("datesBox");
  const session_id = box.dataset.sessionId;
  const msg = $("datesMsg");
  msg.innerHTML = "";

  if(!session_id){
    msg.innerHTML = `<span class="err">No hay sesión seleccionada.</span>`;
    return;
  }

  const inputs = Array.from(box.querySelectorAll(".dateInput"));
  const fechas = inputs.map(i => val(i.value)).filter(Boolean);

  if(!fechas.length){
    msg.innerHTML = `<span class="warn">No hay fechas.</span>`;
    return;
  }

  const set = new Set(fechas);
  if(set.size !== fechas.length){
    msg.innerHTML = `<span class="err">Hay fechas repetidas.</span>`;
    return;
  }

  $("btnSaveDates").disabled = true;
  $("btnSaveDates").textContent = "Guardando...";

  try{
    let r = await sb.from("session_dates").delete().eq("session_id", session_id);
    if(r.error) throw r.error;

    const payload = fechas.map((f, i) => ({
      session_id,
      fecha: f,
      day_number: i + 1
    }));

    r = await sb.from("session_dates").insert(payload);
    if(r.error) throw r.error;

    msg.innerHTML = `<span class="ok">Fechas guardadas.</span> (${fechas.length})`;

    await adminLoadSessions();
    await adminLoadSessionSelects();
    await trainerInit();
  }catch(e){
    msg.innerHTML = `<span class="err">Error:</span> ${esc(e.message || e)}`;
    setLog(e);
  }finally{
    $("btnSaveDates").disabled = false;
    $("btnSaveDates").textContent = "Guardar fechas";
  }
}

window.adminDeleteSession = async (session_id) => {
  if(!confirm("¿Eliminar esta sesión?\n\nSe eliminarán también citaciones, fechas y asistencias asociadas.")) return;
  const sb = getSB();

  try{
    let r = await sb.from("attendance_dates").delete().eq("session_id", session_id);
    if(r.error) throw r.error;

    r = await sb.from("citations").delete().eq("session_id", session_id);
    if(r.error) throw r.error;

    r = await sb.from("session_dates").delete().eq("session_id", session_id);
    if(r.error) throw r.error;

    r = await sb.from("sessions").delete().eq("id", session_id);
    if(r.error) throw r.error;

    await adminRefreshAll();
    await trainerInit();
  }catch(e){
    setStatus(`<span class="err">Error eliminando:</span> ${esc(e.message || e)}`);
    setLog(e);
  }
};

window.adminAddDay = async (session_id) => {
  const sb = getSB();
  const dateEl = document.getElementById(`addDate_${session_id}`);
  const temaEl = document.getElementById(`addTema_${session_id}`);
  const msgEl  = document.getElementById(`addMsg_${session_id}`);

  const fechaRaw = (dateEl?.value || "").trim();
  const tema  = (temaEl?.value || "").trim();

  if(msgEl) msgEl.innerHTML = "";

  if(!fechaRaw){
    if(msgEl) msgEl.innerHTML = `<span class="warn">Debes seleccionar una fecha.</span>`;
    return;
  }

  const fechaISO = parseDateToISO(fechaRaw);
  if(!fechaISO){
    if(msgEl) msgEl.innerHTML = `<span class="err">Fecha inválida.</span>`;
    return;
  }

  try{
    const { data: existing, error: e1 } = await sb
      .from("session_dates")
      .select("fecha")
      .eq("session_id", session_id);

    if(e1) throw e1;

    const set = new Set((existing || []).map(r => String(r.fecha).slice(0,10)));
    if(set.has(fechaISO)){
      if(msgEl) msgEl.innerHTML = `<span class="warn">Esa fecha ya existe.</span>`;
      return;
    }

    const payload = {
      session_id,
      fecha: fechaISO,
      tema_visto: tema || null
    };

    const { error: e2 } = await sb.from("session_dates").insert([payload]);
    if(e2) throw e2;

    if(msgEl) msgEl.innerHTML = `<span class="ok">Día agregado: ${esc(fechaISO)}</span>`;
    if(dateEl) dateEl.value = "";
    if(temaEl) temaEl.value = "";

    await adminLoadSessions();

async function adminUploadEmployees(){
  const sb = getSB();
  const file = $("empFile").files?.[0];
  const msg = $("empMsg");
  msg.innerHTML = "";

  if(!file){ alert("Selecciona un CSV o XLSX."); return; }

  $("btnEmpUpload").disabled = true;
  $("btnEmpUpload").textContent = "Procesando...";

  try{
    let rows = [];
    if(file.name.toLowerCase().endsWith(".xlsx")){
      const buf = await file.arrayBuffer();
      rows = parseXLSX(buf);
    }else{
      const text = await file.text();
      rows = parseDelimited(text);
    }

    if(!rows.length) throw new Error("Archivo vacío.");

    const headers = rows[0].map(h => val(h).toLowerCase()).map(h => h.replace(/\s+/g," ").trim());
    const missing = EMP_HEADERS.filter(h => !headers.includes(h));
    if(missing.length) throw new Error(`Faltan columnas: ${missing.join(", ")}`);

    const idx = {};
    headers.forEach((h,i)=> idx[h]=i);

    const dataRows = rows.slice(1).filter(r => r.some(c => val(c) !== ""));
    if(!dataRows.length) throw new Error("No hay filas de datos.");

    const raw = dataRows.map(r => ({
      documento: normDoc(r[idx.documento]),
      nombre: val(r[idx.nombre]),
      cargo: val(r[idx.cargo]),
      area: val(r[idx.area]),
      supervisor: val(r[idx.supervisor]),
      email: normEmail(r[idx.email]),
      estado: val(r[idx.estado]) || "activo"
    })).filter(x => x.documento && x.nombre);

    if(!raw.length) throw new Error("No hay registros válidos.");

    const map = new Map();
    for(const e of raw) map.set(e.documento, e);
    const payload = [...map.values()];

    let res = await sb.from("employees")
      .upsert(payload, { onConflict: "documento" })
      .select("id,documento,nombre");

    if(res.error && String(res.error.message||"").toLowerCase().includes("on conflict")){
      res = await sb.from("employees").insert(payload).select("id,documento,nombre");
    }
    if(res.error) throw res.error;

    msg.innerHTML = `<span class="ok">Empleados cargados.</span> (${res.data?.length ?? 0})`;
  }catch(e){
    msg.innerHTML = `<span class="err">Error:</span> ${esc(e.message || e)}`;
    setLog(e);
  }finally{
    $("btnEmpUpload").disabled = false;
    $("btnEmpUpload").textContent = "Subir e insertar";
  }
}

async function adminUploadCitations(){
  const sb = getSB();
  const file = $("citeFile")?.files?.[0];
  const msg = $("citeUploadMsg");
  msg.innerHTML = "";

  if(!file){ alert("Selecciona un CSV o XLSX."); return; }

  const selectedSession = $("citeSession")?.value || "";
  $("btnCiteUpload").disabled = true;
  $("btnCiteUpload").textContent = "Cargando...";

  try{
    let rows = [];
    if(file.name.toLowerCase().endsWith(".xlsx")){
      const buf = await file.arrayBuffer();
      rows = parseXLSX(buf);
    }else{
      const text = await file.text();
      rows = parseDelimited(text);
    }
    if(!rows.length) throw new Error("Archivo vacío.");

    const headers = rows[0].map(h => val(h).toLowerCase()).map(h => h.replace(/\s+/g," ").trim());
    const hasSessionId = headers.includes("session_id");
    const hasDocumento = headers.includes("documento");

    if(!hasDocumento) throw new Error("Falta columna documento.");
    if(!hasSessionId && !selectedSession) throw new Error("Falta session_id o sesión seleccionada.");

    const idx = {};
    headers.forEach((h,i)=> idx[h]=i);

    const dataRows = rows.slice(1).filter(r => r.some(c => val(c) !== ""));
    if(!dataRows.length) throw new Error("No hay filas de datos.");

    const raw = dataRows.map(r => ({
      session_id: hasSessionId ? val(r[idx.session_id]) : selectedSession,
      documento: normDoc(r[idx.documento])
    })).filter(x => x.session_id && x.documento);

    if(!raw.length) throw new Error("No hay filas válidas.");

    const bySession = new Map();
    for(const r of raw){
      if(!bySession.has(r.session_id)) bySession.set(r.session_id, []);
      bySession.get(r.session_id).push(r.documento);
    }

    let totalInserted = 0;

    for(const [session_id, docs] of bySession.entries()){
      const uniqueDocs = Array.from(new Set(docs)).filter(Boolean);

      const { data: emps, error: e1 } = await sb
        .from("employees")
        .select("id,documento")
        .in("documento", uniqueDocs);

      if(e1) throw e1;

      const mapDocToId = new Map((emps||[]).map(e => [String(e.documento), e.id]));
      const payload = [];

      for(const doc of uniqueDocs){
        const employee_id = mapDocToId.get(String(doc));
        if(!employee_id) continue;
        payload.push({ session_id, employee_id, estado: "citada" });
      }

      if(payload.length){
        let r = await sb.from("citations").upsert(payload, { onConflict: "session_id,employee_id" });
        if(r.error && String(r.error.message||"").toLowerCase().includes("on conflict")){
          r = await sb.from("citations").insert(payload);
        }
        if(r.error) throw r.error;
        totalInserted += payload.length;
      }
    }

    msg.innerHTML = `<span class="ok">Citaciones cargadas.</span> Citadas: ${totalInserted}.`;
    await adminRefreshAll();
    await trainerInit();
  }catch(e){
    msg.innerHTML = `<span class="err">Error:</span> ${esc(e.message || e)}`;
    setLog(e);
  }finally{
    $("btnCiteUpload").disabled = false;
    $("btnCiteUpload").textContent = "Cargar citaciones";
  }
}

async function trainerLoadDatesInto(session_id){
  const sb = getSB();
  const sel = document.querySelector(`#sess_${CSS.escape(session_id)} .dateSelect`);
  if(!sel) return;

  try{
    const { data: dates, error } = await sb
      .from("session_dates")
      .select("id,fecha")
      .eq("session_id", session_id)
      .order("fecha", { ascending:true });

    if(error) throw error;

    if(!dates?.length){
      sel.innerHTML = `<option value="">(No hay fechas configuradas)</option>`;
      sel.onchange = null;
      return;
    }

    const prev = sel.value;
    sel.innerHTML = dates.map(d => `<option value="${esc(d.id)}">${esc(d.fecha)}</option>`).join("");
    if(prev && dates.some(d => d.id === prev)) sel.value = prev;

    sel.onchange = async () => {
      await trainerLoadTemaManualInto(session_id);
      await trainerLoadCitadosInto(session_id);
    };
  }catch(e){
    sel.innerHTML = `<option value="">(Error cargando fechas)</option>`;
    setLog({ trainer_dates_error: e, session_id });
  }
}

async function trainerLoadCitadosInto(session_id){
  const sb = getSB();
  const sessBox = document.querySelector(`#sess_${CSS.escape(session_id)}`);
  if(!sessBox) return;

  const table = sessBox.querySelector(".tablelike");
  const sel = sessBox.querySelector(".dateSelect");

  const session_date_id = sel?.value || null;
  const fechaSeleccionada = (sel?.selectedOptions?.[0]?.textContent || "").trim();

  const header = table.querySelector(".tr.th");
  table.innerHTML = "";
  table.appendChild(header);

  if(!session_date_id || !fechaSeleccionada){
    table.insertAdjacentHTML("beforeend",
      `<div class="tr"><div class="small"><span class="warn">Selecciona una fecha.</span></div><div></div><div></div><div></div></div>`
    );
    return;
  }

  const temaInfo = await getTemaForSelectedDate(session_id);
  if(!temaInfo.ok){
    table.insertAdjacentHTML("beforeend", `
      <div class="tr">
        <div class="small">
          <span class="warn"><b>Debes guardar el tema del día</b></span>
          <div class="small" style="opacity:.9;margin-top:6px;">
            1) Selecciona la fecha → 2) Escribe el tema del día → 3) Clic en <b>Guardar tema</b>
          </div>
        </div>
        <div></div><div></div><div></div>
      </div>
    `);
    setTrainerLockedUI(session_id, true);
    return;
  }

  try{
    const { data: cit, error } = await sb
      .from("citations")
      .select(`employee_id, employees ( id, documento, nombre )`)
      .eq("session_id", session_id)
      .order("created_at", { ascending:true });

    if(error) throw error;

    if(!cit?.length){
      table.insertAdjacentHTML("beforeend", `
        <div class="tr">
          <div class="small"><span class="warn">No hay citados en esta sesión.</span></div>
          <div></div><div></div><div></div>
        </div>
      `);
      setTrainerLockedUI(session_id, false, temaInfo.tema);
      return;
    }

    const empIds = (cit || []).map(c => c.employee_id).filter(Boolean);

    const { data: at, error: e2 } = await sb
      .from("attendance_dates")
      .select("employee_id, asistio, tarde")
      .eq("session_id", session_id)
      .eq("session_date", fechaSeleccionada)
      .in("employee_id", empIds);

    if(e2) throw e2;

    const attMap = new Map((at || []).map(a => [a.employee_id, { asistio: a.asistio, tarde: a.tarde }]));

    const { data: datesAll, error: e3 } = await sb
      .from("session_dates")
      .select("fecha")
      .eq("session_id", session_id);

    if(e3) throw e3;

    const allFechas = (datesAll || []).map(d => d.fecha).filter(Boolean);
    const totalDays = allFechas.length || 0;

    let trueMap = new Map();
    if(allFechas.length){
      const { data: atAll, error: e4 } = await sb
        .from("attendance_dates")
        .select("employee_id, asistio, session_date")
        .eq("session_id", session_id)
        .in("session_date", allFechas)
        .in("employee_id", empIds);

      if(e4) throw e4;

      for(const row of (atAll || [])){
        if(row.asistio === true){
          trueMap.set(row.employee_id, (trueMap.get(row.employee_id)||0) + 1);
        }
      }
    }

    for(const c of cit){
      const emp = c.employees;
      const name = emp?.nombre ? `${emp.nombre} (${emp.documento || ""})` : (c.employee_id || "");
      const rec = attMap.get(c.employee_id) || null;
      const asistio = rec ? rec.asistio : null;
      const late = rec ? (rec.tarde === true) : false;

      const attended = trueMap.get(c.employee_id) || 0;
      const apto = (totalDays > 0 && attended >= totalDays);
      const prog = (totalDays > 0)
        ? `${attended}/${totalDays} ${apto ? "· APTO" : "· NO APTO"}`
        : `0/0`;

      table.insertAdjacentHTML("beforeend", `
        <div class="tr">
          <div>
            <div class="small">
              ${esc(name)}
              <div class="small" style="margin-top:4px;opacity:.9;">
                <span class="${apto ? "ok":"warn"}">${esc(prog)}</span>
                ${late ? `<span class="warn"> · TARDE</span>` : ``}
              </div>
            </div>
          </div>

          <div>
            <button class="btnMini btnOk" type="button"
              onclick="trainerMark('${session_id}','${c.employee_id}','${esc(fechaSeleccionada)}',true,false)"
              ${asistio === true && !late ? 'disabled' : ''}>Sí</button>
          </div>

          <div>
            <button class="btnMini btnBad" type="button"
              onclick="trainerMark('${session_id}','${c.employee_id}','${esc(fechaSeleccionada)}',false,false)"
              ${asistio === false ? 'disabled' : ''}>No</button>
          </div>

          <div>
            <button class="btnMini btnGhost" type="button"
              onclick="trainerMark('${session_id}','${c.employee_id}','${esc(fechaSeleccionada)}',true,true)"
              ${late ? 'disabled' : ''}>Tarde</button>
          </div>
        </div>
      `);
    }

    setTrainerLockedUI(session_id, false, temaInfo.tema);

  }catch(err){
    table.insertAdjacentHTML("beforeend", `
      <div class="tr">
        <div class="small"><span class="err">Error citados/asistencia:</span> ${esc(err.message || err)}</div><div></div><div></div><div></div>
      </div>
    `);
    setLog({ trainer_load_citados_error: err, session_id });
  }
}

window.trainerMark = async (session_id, employee_id, session_date, asistio, tarde=false) => {
  const sb = getSB();

  if(!session_id || !employee_id || !session_date){
    setStatus(`<span class="err">Faltan datos para guardar asistencia.</span>`);
    return;
  }

  const temaInfo = await getTemaForSelectedDate(session_id);
  if(!temaInfo.ok){
    alert("Primero guarda el tema del día.");
    return;
  }

  try{
    const payload = {
      session_id,
      employee_id,
      session_date,
      asistio: !!asistio,
      tarde: !!tarde
    };

    const { error } = await sb
      .from("attendance_dates")
      .upsert(payload, { onConflict: "session_id,employee_id,session_date" });

    if(error) throw error;

    await trainerLoadCitadosInto(session_id);
  }catch(err){
    setStatus(`<span class="err">Error guardando asistencia:</span> ${esc(err.message || err)}`);
    setLog(err);
  }
};

window.trainerUploadSessionPeople = async (session_id) => {
  const sb = getSB();
  const fileInput = document.getElementById(`trainerFile_${session_id}`);
  const msg = document.getElementById(`trainerFileMsg_${session_id}`);
  const file = fileInput?.files?.[0];

  if(msg) msg.innerHTML = "";

  if(!file){
    if(msg) msg.innerHTML = `<span class="err">Selecciona un archivo Excel o CSV.</span>`;
    return;
  }

  try{
    let rows = [];
    if(file.name.toLowerCase().endsWith(".xlsx")){
      const buf = await file.arrayBuffer();
      rows = parseXLSX(buf);
    }else{
      const text = await file.text();
      rows = parseDelimited(text);
    }

    if(!rows.length) throw new Error("Archivo vacío.");

    const headers = rows[0]
      .map(h => val(h).toLowerCase())
      .map(h => h.replace(/\s+/g, " ").trim());

    const required = ["documento","nombre","cargo","area","supervisor","email","estado"];
    const missing = required.filter(h => !headers.includes(h));
    if(missing.length) throw new Error(`Faltan columnas: ${missing.join(", ")}`);

    const idx = {};
    headers.forEach((h, i) => idx[h] = i);

    const dataRows = rows.slice(1).filter(r => r.some(c => val(c) !== ""));
    if(!dataRows.length) throw new Error("No hay filas de datos.");

    const rawEmployees = dataRows.map(r => ({
      documento: normDoc(r[idx.documento]),
      nombre: val(r[idx.nombre]),
      cargo: val(r[idx.cargo]),
      area: val(r[idx.area]),
      supervisor: val(r[idx.supervisor]),
      email: normEmail(r[idx.email]),
      estado: val(r[idx.estado]) || "activo"
    })).filter(x => x.documento && x.nombre);

    if(!rawEmployees.length) throw new Error("No hay registros válidos.");

    const mapEmp = new Map();
    for(const e of rawEmployees) mapEmp.set(e.documento, e);
    const employeesPayload = [...mapEmp.values()];

    let resEmp = await sb
      .from("employees")
      .upsert(employeesPayload, { onConflict: "documento" })
      .select("id,documento,nombre");

    if(resEmp.error && String(resEmp.error.message || "").toLowerCase().includes("on conflict")){
      resEmp = await sb.from("employees").insert(employeesPayload).select("id,documento,nombre");
    }
    if(resEmp.error) throw resEmp.error;

    const documentos = employeesPayload.map(x => x.documento);

    const { data: emps, error: e2 } = await sb
      .from("employees")
      .select("id,documento")
      .in("documento", documentos);

    if(e2) throw e2;

    const citationsPayload = (emps || []).map(e => ({
      session_id,
      employee_id: e.id,
      estado: "citada"
    }));

    if(citationsPayload.length){
      let resCit = await sb
        .from("citations")
        .upsert(citationsPayload, { onConflict: "session_id,employee_id" });

      if(resCit.error && String(resCit.error.message || "").toLowerCase().includes("on conflict")){
        resCit = await sb.from("citations").insert(citationsPayload);
      }
      if(resCit.error) throw resCit.error;
    }

    if(msg){
      msg.innerHTML = `<span class="ok">Base cargada.</span> Personas citadas: ${citationsPayload.length}`;
    }

    if(fileInput) fileInput.value = "";
    await trainerLoadCitadosInto(session_id);

  }catch(e){
    if(msg) msg.innerHTML = `<span class="err">Error:</span> ${esc(e.message || e)}`;
    setLog(e);
  }
};

window.trainerExportSessionCSV = async (session_id) => {
  const sb = getSB();
  session_id = (session_id ?? "").toString().trim();
  if(!session_id) return alert("session_id vacío");

  try{
    const { data: missing, error: eM } = await sb
      .from("session_dates")
      .select("fecha, tema_visto")
      .eq("session_id", session_id);

    if(eM) throw eM;

    const faltan = (missing || [])
      .filter(r => !String(r.tema_visto || "").trim())
      .map(r => r.fecha);

    if(faltan.length){
      alert("No puedes exportar: faltan temas en estas fechas:\n\n- " + faltan.join("\n- "));
      return;
    }

    const { data: sess, error: e0 } = await sb
      .from("sessions")
      .select("id,fecha,ciudad, trainings ( nombre )")
      .eq("id", session_id)
      .maybeSingle();
    if(e0) throw e0;

    const entrenamiento = sess?.trainings?.nombre || "Entrenamiento";
    const ciudad = sess?.ciudad || "";
    const fecha_inicio = sess?.fecha || "";

    const { data: dates, error: e1 } = await sb
      .from("session_dates")
      .select("fecha")
      .eq("session_id", session_id)
      .order("fecha", { ascending:true });
    if(e1) throw e1;

    const allFechas = (dates || []).map(d => d.fecha).filter(Boolean);
    if(!allFechas.length){
      alert("Esta sesión no tiene fechas configuradas.");
      return;
    }

    const { data: cit, error: e2 } = await sb
      .from("citations")
      .select(`employee_id, employees ( documento, nombre )`)
      .eq("session_id", session_id);
    if(e2) throw e2;

    if(!cit?.length){
      alert("Esta sesión no tiene citados.");
      return;
    }

    const empIds = cit.map(c => c.employee_id).filter(Boolean);

    const { data: atAll, error: e3 } = await sb
      .from("attendance_dates")
      .select("employee_id, session_date, asistio")
      .eq("session_id", session_id)
      .in("session_date", allFechas)
      .in("employee_id", empIds);
    if(e3) throw e3;

    const mapAtt = new Map();
    for(const r of (atAll || [])){
      const k = `${r.employee_id}|${r.session_date}`;
      mapAtt.set(k, { asistio: r.asistio });
    }

    const { data: sdTopics, error: eT } = await sb
      .from("session_dates")
      .select("fecha, tema_visto")
      .eq("session_id", session_id)
      .in("fecha", allFechas);
    if(eT) throw eT;

    const temaPorFecha = new Map(
      (sdTopics || []).map(r => [String(r.fecha).slice(0,10), (r.tema_visto || "")])
    );

    const headers = [
      "sesion_id","entrenamiento","ciudad","fecha_inicio_sesion",
      "session_date","documento","nombre","asistio","tema"
    ];

    const lines = [headers.join(",")];

    for(const f of allFechas){
      for(const c of cit){
        const emp = c.employees || {};
        const doc = (emp.documento ?? "").toString().replaceAll('"','""');
        const nom = (emp.nombre ?? "").toString().replaceAll('"','""');
        const k = `${c.employee_id}|${f}`;
        const att = mapAtt.get(k);
        const asistio = (att?.asistio === true) ? "SI" : (att?.asistio === false ? "NO" : "");
        const tema = (temaPorFecha.get(String(f).slice(0,10)) || "").toString().replaceAll('"','""');

        lines.push([
          session_id,
          `"${entrenamiento.replaceAll('"','""')}"`,
          `"${ciudad.replaceAll('"','""')}"`,
          fecha_inicio,
          f,
          `"${doc}"`,
          `"${nom}"`,
          asistio,
          `"${tema}"`
        ].join(","));
      }
    }

    const csv = lines.join("\n");
    const safeName = `${entrenamiento}`.trim().slice(0,50).replace(/[\\/:*?"<>|]/g,"-");
    const filename = `asistencia_${safeName}_${session_id.slice(0,8)}.csv`;

    downloadTextFile(csv, filename, "text/csv;charset=utf-8");
  }catch(e){
    setStatus(`<span class="err">Error exportando:</span> ${esc(e.message || e)}`);
    setLog(e);
  }
};
