
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Actualización de Contraseña</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .form-container {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      text-align: center;
      color: #333333;
    }
    label {
      display: block;
      margin-top: 15px;
      color: #555555;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #cccccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 20px;
      background-color: #0078D7;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    #responseMessage {
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Actualización de Contraseña</h2>
    <form id="passwordForm">
      <label for="cedula">Cédula:</label>
      <input type="text" id="cedula" name="cedula" required>

      <label for="password">Nueva Contraseña:</label>
      <input type="text" id="password" name="password" required>

      <button type="submit" id="submitBtn">Actualizar</button>
    </form>
    <p id="responseMessage"></p>
  </div>

  <script>
    document.getElementById("passwordForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const cedula = document.getElementById("cedula").value;
      const password = document.getElementById("password").value;
      const submitBtn = document.getElementById("submitBtn");
      const message = document.getElementById("responseMessage");

      submitBtn.disabled = true;
      message.textContent = "Procesando...";
      message.style.color = "#333";

      fetch("https://script.google.com/macros/s/AKfycbx9GoajeclG8nMYoZqiDUMhEAjh2FUrD15_Y7YdlXCXhBpjmx4TQjtFzQzgdiBKLagd/exec", {
        method: "POST",
        body: new URLSearchParams({
          cedula: cedula,
          password: password
        })
      })
      .then(response => response.text())
      .then(data => {
        message.textContent = data;
        if (data.includes("no está activa") || data.includes("no encontrada")) {
          message.style.color = "#d8000c";
        } else {
          message.style.color = "green";
          document.getElementById("cedula").value = "";
          document.getElementById("password").value = "";
        }
        submitBtn.disabled = false;
      })
      .catch(error => {
        message.textContent = "Error al conectar con el servidor.";
        message.style.color = "#d8000c";
        submitBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
